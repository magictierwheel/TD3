name: Test Package

on: 
  push:
    branches: [ main ] 
  schedule:
    - cron: '0 3 * * 6'
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  run_tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest
    - name: Install package
      run: |
        pip install -e .
    - name: Unit tests
      run: |
        # The frozen-PID acceptance suite validates machine-local immutable
        # evidence and the original multi-commit research provenance. Those
        # artifacts are intentionally not part of the public source snapshot.
        python -m pytest tests/ --ignore=tests/circular_tracking/test_hidden_pid_acceptance.py
        rm -rf tmp/
